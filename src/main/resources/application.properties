# ══════════════════════════════════════════════════════════════════
# Load Balancer Configuration
# ══════════════════════════════════════════════════════════════════

server.port=8080

# ── Algorithm ─────────────────────────────────────────────────────
# Options: ROUND_ROBIN, WEIGHTED_ROUND_ROBIN, RANDOM,
#          LEAST_CONNECTIONS, IP_HASH, CONSISTENT_HASH
lb.algorithm=ROUND_ROBIN

# ── Sticky Sessions ──────────────────────────────────────────────
lb.sticky-sessions.enabled=false
lb.sticky-sessions.ttl=3600

# ── Health Checking ──────────────────────────────────────────────
# Interval between health checks (ms)
lb.health.interval=5000
# Timeout for each health check probe (ms)
lb.health.timeout=3000
# Consecutive successes to mark HEALTHY
lb.health.healthy-threshold=2
# Consecutive failures to mark UNHEALTHY
lb.health.unhealthy-threshold=3
# Probe type: HTTP or TCP
lb.health.check-type=HTTP

# ── Connection Draining ──────────────────────────────────────────
lb.connection-drain.timeout=30000

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.loadbalancer=INFO
logging.level.com.loadbalancer.proxy=DEBUG
logging.level.com.loadbalancer.health=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
